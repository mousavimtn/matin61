name: Relay Tunnel
on: [push]
jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Runner is active"
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y dante-server curl
          echo "socksmethod: none" | sudo tee /etc/danted.conf
          echo "internal: 0.0.0.0 port = 1080" | sudo tee -a /etc/danted.conf
          echo "external: eth0" | sudo tee -a /etc/danted.conf
          sudo service danted start
          echo "SOCKS5 proxy running on port 1080"
          
          # نصب و راه‌اندازی ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -y && sudo apt-get install ngrok -y
          
          echo "Attempting to start ngrok..."
          ngrok tcp 1080 --log=stdout &
          sleep 8
          TUNNEL_URL=$(curl -s localhost:4040/api/tunnels | grep -o '"public_url":"[^"]*' | grep -o 'tcp://[^"]*')
          echo "::notice::NGROK URL: $TUNNEL_URL"
          sleep 3600
