name: Proxy Server
on: [push]
jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Runner is active"
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y dante-server
          sudo bash -c 'echo "socksmethod: none" > /etc/danted.conf'
          sudo bash -c 'echo "internal: 0.0.0.0 port = 1080" >> /etc/danted.conf'
          sudo bash -c 'echo "external: eth0" >> /etc/danted.conf'
          sudo service danted start
          echo "SOCKS5 proxy running on port 1080"
          echo "PROXY_IP=$(curl -s ifconfig.me)"
          sleep 3600
