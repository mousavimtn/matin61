name: VLESS Server
on: [push]
jobs:
  vless:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Runner is active"
      - run: |
          # نصب Xray
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip
          chmod +x xray
          
          # ساخت کانفیگ VLESS
          cat > config.json << 'XEOF'
          {
            "inbounds": [{
              "port": 1080,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "4020fc3c-1dd2-11ec-9e3a-f23c91d8cf91"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "security": "none"
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          XEOF
          
          # اجرای Xray
          ./xray run -c config.json &
          sleep 3
          
          # اجرای پروکسی Socks5 مستقیم و نمایش IP
          sudo apt-get update -y
          sudo apt-get install -y dante-server
          sudo bash -c 'echo "socksmethod: none" > /etc/danted.conf'
          sudo bash -c 'echo "internal: 0.0.0.0 port = 1080" >> /etc/danted.conf'
          sudo bash -c 'echo "external: eth0" >> /etc/danted.conf'
          sudo service danted start
          echo "PROXY_IP=$(curl -s ifconfig.me)"
          sleep 3600
