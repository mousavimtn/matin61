name: VLESS Server
on: [push]
jobs:
  vless:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Runner is active"
      - run: |
          # نصب Xray
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip
          chmod +x xray
          
          # ساخت کانفیگ VLESS
          cat > config.json << 'XEOF'
          {
            "inbounds": [{
              "port": 1080,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "4020fc3c-1dd2-11ec-9e3a-f23c91d8cf91"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "security": "none"
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          XEOF
          
          # اجرای Xray
          ./xray run -c config.json &
          sleep 3
          
          # نصب و اجرای ngrok برای تونل
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -y && sudo apt-get install ngrok -y
          
          echo "Starting ngrok..."
          ngrok tcp 1080 --log=stdout &
          sleep 8
          TUNNEL_URL=$(curl -s localhost:4040/api/tunnels | grep -o '"public_url":"[^"]*' | grep -o 'tcp://[^"]*')
          echo "::notice::NGROK URL: $TUNNEL_URL"
          sleep 3600
